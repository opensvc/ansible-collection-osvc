---

- name: Ensure service is running on first node
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} takeover --wait"
  register: install_slapos_comp1_output
  changed_when: install_slapos_comp1_output.rc == 0
  when:
    - inventory_hostname == ansible_play_hosts[0]

- name: Get fs install root
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} eval --kw fs#0.mnt"
  register: install_slapos_comp1_output
  changed_when: install_slapos_comp1_output.rc == 0
  when:
    - inventory_hostname == ansible_play_hosts[0]

- name: Set fact on re6st existence
  ansible.builtin.set_fact:
    install_slapos_comp1_re6st_root: "{{ install_slapos_comp1_output.stdout }}"
    install_slapos_comp1_re6st_etc: "{{ install_slapos_comp1_output.stdout }}/re6st/etc/re6stnet"
  when:
    - inventory_hostname == ansible_play_hosts[0]

- name: Check if configuration already exists
  ansible.builtin.stat:
    path: "{{ install_slapos_comp1_re6st_etc }}/re6stnet.conf"
  register: install_slapos_comp1_re6stnet_conf
  when:
    - inventory_hostname == ansible_play_hosts[0]

- name: Configure Re6st with re6st-conf
  ansible.builtin.shell:
    cmd: |
      re6st-conf \
        --registry {{ install_slapos_comp1_re6st_registry }} \
        --fingerprint {{ install_slapos_comp1_re6st_fingerprint }} \
        --token {{ install_slapos_comp1_re6st_token }} \
        -r title {{ install_slapos_comp1_computer_name }} \
        -d {{ install_slapos_comp1_re6st_etc }} \
        {{ install_slapos_comp1_re6st_location }}
    executable: /bin/bash
  register: install_slapos_comp1_re6st_conf_command
  changed_when: install_slapos_comp1_re6st_conf_command.rc == 0
  when:
    - inventory_hostname == ansible_play_hosts[0]
    - not install_slapos_comp1_re6stnet_conf.stat.exists

- name: Complete re6st config
  ansible.builtin.blockinfile:
    path: "{{ install_slapos_comp1_re6st_etc }}/re6stnet.conf"
    block: |
      log {{ install_slapos_comp1_re6st_root }}/re6st/log
      run {{ install_slapos_comp1_re6st_root }}/re6st/run
      state {{ install_slapos_comp1_re6st_root }}/re6st/state
    marker: "# required for opensvc failover"
    insertafter: EOF
  when:
    - inventory_hostname == ansible_play_hosts[0]
    - not install_slapos_comp1_re6stnet_conf.stat.exists

- name: Enable re6st app management with OpenSVC
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} enable --rid app#0"
  register: install_slapos_comp1_enable
  changed_when: install_slapos_comp1_enable.rc == 0
  when:
    - inventory_hostname == ansible_play_hosts[0]
    - not install_slapos_comp1_re6stnet_conf.stat.exists

- name: Start re6st app management with OpenSVC
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} start --rid app#0"
  register: install_slapos_comp1_start
  changed_when: install_slapos_comp1_start.rc == 0
  when:
    - inventory_hostname == ansible_play_hosts[0]
    - not install_slapos_comp1_re6stnet_conf.stat.exists

- name: Force status evaluation
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} print status -r"
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname == ansible_play_hosts[0]
    - not install_slapos_comp1_re6stnet_conf.stat.exists
    - install_slapos_comp1_opensvc_major is defined and install_slapos_comp1_opensvc_major | int == 2

- name: Force status evaluation (v3 flat output)
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} print status --output flat"
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname == ansible_play_hosts[0]
    - not install_slapos_comp1_re6stnet_conf.stat.exists
    - install_slapos_comp1_opensvc_major is defined and install_slapos_comp1_opensvc_major | int == 3
