---
- name: Display all variables/facts known for a host
  ansible.builtin.debug:
    var: hostvars[inventory_hostname]
    verbosity: 3

- name: Get cluster name
  ansible.builtin.command: om cluster get --kw cluster.name
  register: install_slapos_comp1_cluster_name
  changed_when: false
  run_once: true

- name: Get OpenSVC major version
  ansible.builtin.shell: |
    set -o pipefail && om node --version 2>/dev/null | grep -oP '^\d+' || echo "2"
  register: install_slapos_comp1_om_version
  changed_when: false
  run_once: true

- name: Set facts
  ansible.builtin.set_fact:
    install_slapos_comp1_clustername: "{{ install_slapos_comp1_cluster_name.stdout }}"
    install_slapos_comp1_opensvc_major: "{{ install_slapos_comp1_om_version.stdout | trim }}"

- name: Debug version
  ansible.builtin.debug:
    msg: "OpenSVC major version: {{ install_slapos_comp1_opensvc_major }}"
    verbosity: 2
  run_once: true

- name: Copy launcher files to /tmp on first node
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /tmp
    owner: root
    mode: '600'
    force: true
  with_fileglob:
    - files/*
  when: inventory_hostname == ansible_play_hosts[0]

- name: Generate re6st launcher from template on first node
  ansible.builtin.template:
    src: re6st.j2
    dest: "/tmp/re6st"
    mode: '755'
  when: inventory_hostname == ansible_play_hosts[0]

- name: Ensure configmap exists (v3)
  ansible.builtin.command: "om {{ install_slapos_comp1_cfgpath }} create --wait"
  register: install_slapos_comp1_create_cfg
  changed_when: install_slapos_comp1_create_cfg.rc == 0
  when:
    - install_slapos_comp1_opensvc_major | int == 3
    - inventory_hostname == ansible_play_hosts[0]

- name: Ensure configmap exists (v2)
  ansible.builtin.command: "om {{ install_slapos_comp1_cfgpath }} create"
  register: install_slapos_comp1_create_cfg
  changed_when: install_slapos_comp1_create_cfg.rc == 0
  when:
    - install_slapos_comp1_opensvc_major | int == 2
    - inventory_hostname == ansible_play_hosts[0]

- name: Add re6st and slapos keys to configmap (v3)
  ansible.builtin.command: "om {{ install_slapos_comp1_cfgpath }} key add --name {{ item }} --from /tmp/{{ item }}"
  register: install_slapos_comp1_key_add
  changed_when: install_slapos_comp1_key_add.rc == 0
  loop:
    - re6st
    - slapos
  when:
    - install_slapos_comp1_opensvc_major | int == 3
    - inventory_hostname == ansible_play_hosts[0]

- name: Add re6st and slapos keys to configmap (v2)
  ansible.builtin.command: "om {{ install_slapos_comp1_cfgpath }} add --key {{ item }} --from /tmp/{{ item }}"
  register: install_slapos_comp1_key_add
  changed_when: install_slapos_comp1_key_add.rc == 0
  loop:
    - re6st
    - slapos
  when:
    - install_slapos_comp1_opensvc_major | int == 2
    - inventory_hostname == ansible_play_hosts[0]

####################################################################

- name: Set opensvc service template filename
  ansible.builtin.set_fact:
    install_slapos_comp1_osvc_svc_template: "/tmp/osvc.{{ install_slapos_comp1_name }}.conf"
  when: inventory_hostname == ansible_play_hosts[0]

- name: Deploy service configuration template on first node
  ansible.builtin.template:
    src: osvc.slapos_comp1.conf.j2
    dest: "{{ install_slapos_comp1_osvc_svc_template }}"
    mode: '600'
  when: inventory_hostname == ansible_play_hosts[0]

- name: Check if service already exists (v3)
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} ls --ignore-not-found"
  register: install_slapos_comp1_svc_check_v3
  changed_when: false
  run_once: true
  when: install_slapos_comp1_opensvc_major | int == 3

- name: Check if service already exists (v2)
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} ls"
  register: install_slapos_comp1_svc_check_v2
  changed_when: false
  run_once: true
  when: install_slapos_comp1_opensvc_major | int == 2
  ignore_errors: true

- name: Set fact install_slapos_comp1_service_exists
  ansible.builtin.set_fact:
    install_slapos_comp1_service_exists: false
  run_once: true

- name: Set fact install_slapos_comp1_service_exists (v3)
  ansible.builtin.set_fact:
    install_slapos_comp1_service_exists: true
  when:
    - install_slapos_comp1_opensvc_major | int == 3
    - install_slapos_comp1_svc_check_v3.stdout is search(install_slapos_comp1_svcpath)
  run_once: true

- name: Set fact install_slapos_comp1_service_exists (v2)
  ansible.builtin.set_fact:
    install_slapos_comp1_service_exists: true
  when:
    - install_slapos_comp1_opensvc_major | int == 2
    - install_slapos_comp1_svc_check_v2.stdout is search(install_slapos_comp1_svcpath)
  run_once: true

- name: Debug service existence
  ansible.builtin.debug:
    msg: "Service exists: {{ install_slapos_comp1_service_exists }}"
  run_once: true

- name: Create service if not exists (v3)
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} create --config {{ install_slapos_comp1_osvc_svc_template }} --wait"
  register: install_slapos_comp1_create_svc
  changed_when: install_slapos_comp1_create_svc.rc == 0
  when:
    - install_slapos_comp1_opensvc_major | int == 3
    - not install_slapos_comp1_service_exists
    - inventory_hostname == ansible_play_hosts[0]

- name: Create service if not exists (v2)
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} create --config {{ install_slapos_comp1_osvc_svc_template }}"
  register: install_slapos_comp1_create_svc
  changed_when: install_slapos_comp1_create_svc.rc == 0
  when:
    - install_slapos_comp1_opensvc_major | int == 2
    - not install_slapos_comp1_service_exists
    - inventory_hostname == ansible_play_hosts[0]

- name: Update service configuration if exists (v3 only)
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} config update --config {{ install_slapos_comp1_osvc_svc_template }}"
  register: install_slapos_comp1_update_svc
  changed_when: install_slapos_comp1_update_svc.rc == 0
  when:
    - install_slapos_comp1_opensvc_major | int == 3
    - install_slapos_comp1_service_exists
    - inventory_hostname == ansible_play_hosts[0]

- name: Force service provision (always, to ensure fs#0 is mounted)
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} provision --wait --time 600s"
  register: install_slapos_comp1_provision_svc
  changed_when: install_slapos_comp1_provision_svc.rc == 0
  when: inventory_hostname == ansible_play_hosts[0]
  ignore_errors: true

- name: Wait for service to be provisioned (v3, check provisioned flag)
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} print status --kw provisioned"
  register: install_slapos_comp1_prov_status
  until: install_slapos_comp1_prov_status.stdout == "true"
  changed_when: install_slapos_comp1_prov_status.stdout == "true"
  retries: 30
  delay: 5
  when:
    - inventory_hostname == ansible_play_hosts[0]
    - install_slapos_comp1_opensvc_major | int == 3
  ignore_errors: true

- name: Get fs#0 mount point
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} eval --kw fs#0.mnt"
  register: install_slapos_comp1_fs0_mnt
  changed_when: false
  when: inventory_hostname == ansible_play_hosts[0]

- name: Set fact for shared directory
  ansible.builtin.set_fact:
    install_slapos_comp1_shared_dir: "{{ install_slapos_comp1_fs0_mnt.stdout }}"
  when: inventory_hostname == ansible_play_hosts[0]

- name: Ensure re6st and slapos directories exist in shared fs
  ansible.builtin.file:
    path: "{{ install_slapos_comp1_shared_dir }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - re6st
    - slapos
  when: inventory_hostname == ansible_play_hosts[0]

- name: Copy re6st script to shared fs
  ansible.builtin.copy:
    src: /tmp/re6st
    dest: "{{ install_slapos_comp1_shared_dir }}/re6st/re6st"
    mode: '0755'
    remote_src: true
  when: inventory_hostname == ansible_play_hosts[0]

- name: Copy slapos script to shared fs
  ansible.builtin.copy:
    src: /tmp/slapos
    dest: "{{ install_slapos_comp1_shared_dir }}/slapos/slapos"
    mode: '0755'
    remote_src: true
  when: inventory_hostname == ansible_play_hosts[0]

- name: Wait for service state up
  ansible.builtin.script:
    cmd: ./files/object_wait_status.sh {{ ansible_hostname }} {{ install_slapos_comp1_svcpath }} avail up 300s
  changed_when: false
  register: install_slapos_comp1_wait_loop
  failed_when: install_slapos_comp1_wait_loop.rc != 0
  when:
    - inventory_hostname == ansible_play_hosts[0]
    - install_slapos_comp1_opensvc_major | int == 2

- name: Delete sync#i0 via config update (v3)
  ansible.builtin.command: "om {{ install_slapos_comp1_svcpath }} config update --delete sync#i0"
  register: install_slapos_comp1_del_res
  failed_when: install_slapos_comp1_del_res.rc != 0
  changed_when: install_slapos_comp1_del_res.rc == 0
  when:
    - inventory_hostname == ansible_play_hosts[0]
    - install_slapos_comp1_opensvc_major | int == 3
