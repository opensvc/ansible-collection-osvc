---
- name: Set fact on vip creation
  ansible.builtin.set_fact:
    provision_cluster_vip_created: true
  run_once: true

- name: Check for vip existence
  ansible.builtin.command: "om system/svc/vip ls"
  changed_when: false
  register: provision_cluster_svcvip
  run_once: true

- name: Set fact according to actual vip existence
  ansible.builtin.set_fact:
    provision_cluster_vip_created: false
  run_once: true
  when:
    - "'system/svc/vip' not in provision_cluster_svcvip.stdout"

- name: Identify node ip used for production
  ansible.builtin.shell: set -o pipefail && grep -w {{ ansible_hostname }} /etc/hosts | head -1 | awk '{print $1}'
  args:
    executable: /bin/bash
  changed_when: false
  register: provision_cluster_grepquery
  when:
    - not provision_cluster_vip_created

- name: Set fact according to command result
  ansible.builtin.set_fact:
    provision_cluster_osvc_node_prd_ip: "{{ provision_cluster_grepquery.stdout }}"
  when:
    - not provision_cluster_vip_created

- name: Identify node nic used for production
  ansible.builtin.shell: set -o pipefail && ip route ls | grep {{ provision_cluster_osvc_node_prd_ip }} | head -1 | grep -Po '(?<=dev )(\S+)'
  args:
    executable: /bin/bash
  register: provision_cluster_iproutequery
  changed_when: false
  when:
    - not provision_cluster_vip_created

- name: Set fact according to command result
  ansible.builtin.set_fact:
    provision_cluster_osvc_node_prd_nic: "{{ provision_cluster_iproutequery.stdout }}"
  when:
    - not provision_cluster_vip_created

- name: Add cluster vip
  ansible.builtin.shell:
    "om cluster set
    --kw cluster.vip@{{ ansible_hostname }}={{ provision_cluster_osvc_cluster_vip_addr }}/{{ provision_cluster_osvc_cluster_vip_cidr_subnet }}\
    @{{ provision_cluster_osvc_cluster_vip_nic_name }}@{{ provision_cluster_osvc_node_prd_nic }} && sleep 5"
  throttle: 1
  register: provision_cluster_output
  changed_when: provision_cluster_output.rc == 0
  when:
    - not provision_cluster_vip_created
    - provision_cluster_nodecount|int > 1

- name: Add cluster vip (single-node)
  ansible.builtin.command: >-
    om cluster set --kw cluster.vip@{{ ansible_hostname }}=
    {{ provision_cluster_osvc_cluster_vip_addr }}/{{ provision_cluster_osvc_cluster_vip_cidr_subnet }}@{{ provision_cluster_osvc_node_prd_nic }}
  run_once: true
  register: provision_cluster_output
  changed_when: provision_cluster_output.rc == 0
  when:
    - not provision_cluster_vip_created
    - provision_cluster_nodecount|int == 1

- name: Wait for vip service instance to be spawned
  ansible.builtin.command: 'sleep 5'
  run_once: true
  changed_when: false
  when:
    - not provision_cluster_vip_created

- name: Unfreeze vip service
  ansible.builtin.command: 'om system/svc/vip thaw'
  run_once: true
  register: provision_cluster_output
  changed_when: provision_cluster_output.rc == 0
  when:
    - not provision_cluster_vip_created
