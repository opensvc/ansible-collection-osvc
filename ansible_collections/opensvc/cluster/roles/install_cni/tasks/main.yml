---
# tasks file for install_cni

- name: Set fact according to binary deployment
  ansible.builtin.set_fact:
    install_cni_bin_is_installed: 'false'

- name: Check if cni bin exists
  ansible.builtin.stat:
    path: "{{ install_cni_osvc_cni_plugins_dir }}/{{ item }}"
  with_items: "{{ install_cni_plugin_binaries | flatten }}"
  register: install_cni_check_result

- name: Set fact according to actual cni binary existence
  ansible.builtin.set_fact:
    install_cni_bin_is_installed: 'true'
  when:
    - item.stat.exists
  loop: "{{ install_cni_check_result.results }}"

- name: Display cni binary install flag
  ansible.builtin.debug:
    var: install_cni_bin_is_installed
    verbosity: 2

- name: Deploy cni plugins
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.dest }}"
    checksum: "{{ item.checksum }}"
    timeout: 300
    mode: '0440'
  loop:
    - "{{ install_cni_download_url }}"
  register: install_cni_get_url_result
  until: install_cni_get_url_result is succeeded
  when:
    - not install_cni_bin_is_installed

- name: Create directory if it does not exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  with_items:
    - "{{ install_cni_osvc_cni_plugins_dir }}"
    - "{{ install_cni_osvc_cni_config_dir }}"
  when:
    - not install_cni_bin_is_installed

- name: Unarchive package
  ansible.builtin.shell: |
    set -o pipefail
    cd {{ install_cni_osvc_cni_plugins_dir }}
    TMP_DIR="`mktemp -d`" && tar -zx -C $TMP_DIR -f {{ install_cni_download_url.dest }} && mv $TMP_DIR/* . && rm -rf $TMP_DIR
  args:
    executable: "/bin/bash"
  register: install_cni_output
  changed_when: install_cni_output.rc == 0
  when:
    - not install_cni_bin_is_installed
    - install_cni_get_url_result is changed

- name: Get CNI paths for OpenSVC cluster
  ansible.builtin.command: om cluster get --kw cni.plugins
  register: install_cni_cnipluginspath
  failed_when: false
  changed_when: false
  run_once: true
  when:
    - not install_cni_bin_is_installed

- name: Set CNI paths for OpenSVC cluster
  ansible.builtin.command: om cluster set --kw cni.plugins={{ install_cni_osvc_cni_plugins_dir }} --kw cni.config={{ install_cni_osvc_cni_config_dir }}
  run_once: true
  register: install_cni_output
  changed_when: install_cni_output.rc == 0
  when:
    - not install_cni_bin_is_installed
    - install_cni_osvc_cni_plugins_dir != install_cni_cnipluginspath.stdout
