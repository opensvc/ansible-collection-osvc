---
# tasks file for install_envoy

- name: Set fact on envoy cfgmap creation
  ansible.builtin.set_fact:
    install_envoy_envoy_cfg_created: 'true'
  run_once: true

- name: Check for envoy cfgmap existence
  ansible.builtin.command: om system/cfg/envoy ls
  changed_when: false
  register: install_envoy_osvc_envoy_cfgmap_query
  run_once: true

- name: Set fact according to actual envoy cfgmap existence
  ansible.builtin.set_fact:
    install_envoy_envoy_cfg_created: 'false'
  run_once: true
  when:
    - install_envoy_osvc_envoy_cfgmap_name not in install_envoy_osvc_envoy_cfgmap_query.stdout

- name: Create envoy cfgmap
  ansible.builtin.command: om {{ install_envoy_osvc_envoy_cfgmap_name }} create
  run_once: true
  register: install_envoy_output
  changed_when: install_envoy_output.rc == 0
  when:
    - not install_envoy_envoy_cfg_created

- name: Set envoy cfgmap server key content
  ansible.builtin.command: om {{ install_envoy_osvc_envoy_cfgmap_name }} add --key xds.yaml --from {{ install_envoy_osvc_envoy_cfg_xds_template }}
  run_once: true
  register: install_envoy_output
  changed_when: install_envoy_output.rc == 0
  when:
    - not install_envoy_envoy_cfg_created

- name: Set fact on envoy service creation
  ansible.builtin.set_fact:
    install_envoy_envoy_svc_created: 'true'
  run_once: true

- name: Check for envoy svc existence
  ansible.builtin.command: om {{ install_envoy_osvc_envoy_service_name }} ls
  changed_when: false
  register: install_envoy_osvc_envoy_svc_query
  run_once: true

- name: Set fact according to actual envoy svc existence
  ansible.builtin.set_fact:
    install_envoy_envoy_svc_created: 'false'
  run_once: true
  when:
    - install_envoy_osvc_envoy_service_name not in install_envoy_osvc_envoy_svc_query.stdout

- name: Deploy envoy service
  ansible.builtin.command: om {{ install_envoy_osvc_envoy_service_name }} deploy --config {{ install_envoy_osvc_envoy_svc_template }}
  run_once: true
  register: install_envoy_output
  changed_when: install_envoy_output.rc == 0
  when:
    - not install_envoy_envoy_svc_created

- name: Wait for envoy service
  ansible.builtin.script:
    cmd: ../files/monitor.overall.sh {{ install_envoy_osvc_envoy_service_name }} up 300s
  run_once: true
  changed_when: false
  when:
    - not install_envoy_envoy_svc_created
