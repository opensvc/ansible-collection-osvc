---
# tasks file for install_backend_network

- name: Set fact according to actual network config
  ansible.builtin.set_fact:
    install_backend_network_is_configured: 'true'
  run_once: true

- name: Check for actual network config
  ansible.builtin.shell:
    cmd: set -o pipefail && om net ls | grep -w {{ install_backend_network_osvc_backend_subnet_name }}
  args:
    executable: /bin/bash
  failed_when: false
  changed_when: false
  register: install_backend_network_list
  run_once: true

- name: Set fact according to actual network existence
  ansible.builtin.set_fact:
    install_backend_network_is_configured: 'false'
  run_once: true
  when:
    - install_backend_network_osvc_backend_subnet_name not in install_backend_network_list.stdout

- name: Display network existence flag
  ansible.builtin.debug:
    var: install_backend_network_is_configured
    verbosity: 2

- name: Configure backend network
  ansible.builtin.command:
    cmd: >
      om cluster set
      --kw network#{{ install_backend_network_osvc_backend_subnet_name }}.type=routed_bridge
      --kw network#{{ install_backend_network_osvc_backend_subnet_name }}.network={{ install_backend_network_osvc_backend_subnet_range }}
      --kw network#{{ install_backend_network_osvc_backend_subnet_name }}.ips_per_node={{ install_backend_network_osvc_backend_subnet_ips_per_node }}
      --kw network#{{ install_backend_network_osvc_backend_subnet_name }}.tunnel={{ install_backend_network_osvc_backend_tunnel }}
  run_once: true
  register: install_backend_network_output
  changed_when: install_backend_network_output.rc == 0
  when:
    - not install_backend_network_is_configured
