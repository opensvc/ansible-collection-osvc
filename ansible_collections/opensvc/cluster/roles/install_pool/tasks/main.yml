---
# tasks file for install_pool

- name: Set fact according to actual pool config
  ansible.builtin.set_fact:
    install_pool_pool_is_configured: 'true'
  run_once: true

- name: Check for actual pool config
  ansible.builtin.shell:
    cmd: set -o pipefail && om pool ls | grep -w {{ install_pool_osvc_pool_name }}
  args:
    executable: /bin/bash
  failed_when: false
  changed_when: false
  register: install_pool_osvc_pool_list
  run_once: true

- name: Set fact according to actual pool existence
  ansible.builtin.set_fact:
    install_pool_pool_is_configured: 'false'
  run_once: true
  when:
    - install_pool_osvc_pool_name not in install_pool_osvc_pool_list.stdout

- name: Display pool existence flag
  ansible.builtin.debug:
    var: install_pool_pool_is_configured
    verbosity: 2

- name: Configure directory pool
  ansible.builtin.include_tasks: "directory.yml"
  when:
    - not install_pool_pool_is_configured
    - install_pool_osvc_pool_type == "directory"

- name: Configure drbd pool
  ansible.builtin.include_tasks: "drbd.yml"
  when:
    - not install_pool_pool_is_configured
    - install_pool_osvc_pool_type == "drbd"

- name: Configure pool schedule
  ansible.builtin.command:
    cmd: >
      om cluster set
      --kw pool#{{ install_pool_osvc_pool_name }}.status_schedule={{ install_pool_osvc_pool_status_schedule }}
  run_once: true
  register: install_pool_output
  changed_when: install_pool_output.rc == 0
  when:
    - not install_pool_pool_is_configured
    - ( install_pool_osvc_pool_status_schedule | length ) > 0
